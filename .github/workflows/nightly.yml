# =====================================================================
# GitHub Actions —— Nightly Regression (定时全量回归)
# ---------------------------------------------------------------------
# 对应学习思路："nightly regression：定时触发、多配置并行、结果通知"
#
# 与 regression.yml 的区别：
#   - 不是 push 触发，而是"每天定时"触发（深夜跑，不占用白天资源）；
#   - 用 matrix 做"多配置并行"（演示同时跑多个 Python 版本 / 多组用例）；
#   - 跑完汇总结果，可发邮件/通知（这里给出邮件 step 的写法，默认注释）。
# =====================================================================

name: Nightly 全量回归

# 触发条件：
on:
  schedule:
    # cron 用 UTC 时间。'0 18 * * *' = 每天 UTC 18:00 = 北京时间次日 02:00。
    # 五个字段含义：分 时 日 月 周
    - cron: "0 18 * * *"
  workflow_dispatch:        # 也允许手动触发，方便调试

jobs:
  nightly:
    # 指定运行环境：使用 GitHub 提供的最新版 Ubuntu 虚拟机
    runs-on: ubuntu-latest

    # --- 多配置并行：matrix 会为每个组合各起一个并行 job ---------------
    # strategy 用于定义一组并行执行的任务矩阵。它告诉 GitHub：“请根据我给出的组合，动态创建多个独立的 Job”。
    strategy:
      fail-fast: false      # 一个配置失败，不影响其它配置继续跑
      matrix:
        python: ["3.9", "3.11"]          # 多 Python 版本
        marker: ["reg", "perf", "cov"]   # 把不同类用例拆到不同 job 并行
    # 上面 2×3 = 6 个并行 job，名字形如 nightly (3.9, reg)

    # name 用于定义这个 Job 在 GitHub Actions 网页界面（PR 或 Actions 标签页）上显示的名字。
    # 这里使用了 ${{ ... }} 表达式进行动态插值。当运行 (python: 3.9, marker: reg) 这个组合时，name 会被渲染为 nightly (py3.9, reg)；运行 (3.11, perf) 时，则显示为 nightly (py3.11, perf)。
    name: nightly (py${{ matrix.python }}, ${{ matrix.marker }})

    #     steps:
    #  # Step 写法一：使用 Action（用 uses 引用）
    #   - name: 拉取代码
    #     uses: actions/checkout@v4         # 引用官方 checkout Action（@v4 表示使用 v4 版本）

    #   # Step 写法二：执行 Shell 命令（用 run 指定）
    #   - name: 输出 Node 版本
    #     run: node --version

    #   # Step 写法三：执行多行 Shell 命令（用 | 表示多行）
    #   - name: 安装依赖并构建
    #     run: |
    #      npm install
    #       npm run build
    #       echo "构建完成"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: #with 的作用是给当前使用的 Action（uses 指定的插件）传递“输入参数”（Inputs）。
          python-version: ${{ matrix.python }}
          cache: pip

      - name: 安装依赖
        working-directory: pyverif
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 只跑当前 matrix 指定的那一类用例（-m ${{ matrix.marker }}）
      - name: 运行 ${{ matrix.marker }} 用例
        working-directory: pyverif
        run: |
          pytest -m "${{ matrix.marker }} and not sim" \
            --junitxml=reports/junit-${{ matrix.marker }}-py${{ matrix.python }}.xml

      - name: 上传本配置报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.python }}-${{ matrix.marker }} # 告诉这个 Action 上传的压缩包叫什么名字
          path: pyverif/reports/ #告诉这个 Action 要上传哪个文件夹。

  # --- 汇总 job：等所有并行 job 结束后，统一通知 ----------------------
  notify:
    needs: nightly          # 依赖上面的 nightly job 全部完成
    if: always()     # always()：无论成功还是失败，都执行
    runs-on: ubuntu-latest
    steps:
      - name: 汇总结论
        run: |
          echo "Nightly 回归完成。结果状态: ${{ needs.nightly.result }}"
          # needs.nightly.result 为 success / failure，可据此决定是否报警

      # --- 邮件通知（默认注释；填好 secrets 后取消注释即可）-----------
      # 真实项目里把 SMTP 账号密码存到仓库 Settings -> Secrets，
      # 千万不要把密码明文写进 yml！
