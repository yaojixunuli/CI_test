# =====================================================================
# pytest 配置文件
# ---------------------------------------------------------------------
# pytest 启动时会自动向上查找 pytest.ini / pyproject.toml / setup.cfg，
# 把找到的目录作为 "rootdir"。这里我们把它放在 pyverif/ 下，
# 这样在 pyverif/ 目录里直接执行 `pytest` 即可。
# =====================================================================

[pytest]

# --- 测试发现规则（pytest 靠"约定"找用例，不需要手动注册）---------------
# 1) 在哪些目录找         2) 文件名规则      3) 类名规则     4) 函数名规则
testpaths   = tests
python_files   = test_*.py
python_classes = Test*
python_functions = test_*

# --- 默认命令行参数：每次运行 pytest 都自动带上 -------------------------
#  -ra            : 结尾打印所有非通过用例的简短原因（s/x/X/f/E...）
#  -q             : 安静模式，输出更紧凑
#  --strict-markers: 使用未注册的 marker 直接报错，避免拼写错误悄悄失效
#  --color=yes    : 强制彩色输出
addopts =
    -ra
    -q
    --strict-markers
    --color=yes

# --- 自定义 marker（标签）-------------------------------------------------
# 用法： @pytest.mark.slow ，然后 `pytest -m slow` 只跑慢用例，
#        或 `pytest -m "not sim"` 跳过需要仿真器的用例。
markers =
    smoke: 冒烟测试，最快、最基础，提交代码前必跑
    reg: 寄存器读写功能测试
    perf: 性能测试（延迟 / 带宽 / 压力）
    cov: 覆盖率门限检查
    analysis: 日志 / 数据分析类用例
    sim: 需要真实仿真器（VCS/xsim）才能运行，CI 上可用 `-m "not sim"` 跳过

# --- 日志显示：让 print/logging 在用例失败时更易读 -----------------------
log_cli = false
log_cli_level = INFO
